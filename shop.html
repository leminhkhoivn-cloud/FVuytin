<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>
  <style>
    body {
      background-color: #0a0e27;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .navbar, .footer {
      background-color: #00ffc8;
      padding: 10px;
      text-align: center;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }
    .product {
      background-color: #1a1d2e;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
    }
    .product img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
    }
    .product-name {
      font-size: 1.1em;
      margin: 10px 0;
    }
    .product-price {
      font-size: 1.5em;
      color: #00ffc8;
    }
  </style>
</head>
<body>
  <div class="navbar">Navbar</div>
  <div class="container">
    <div class="product">
      <img src="/path/to/image1.jpg" alt="Product 1">
      <div class="product-name">Product 1</div>
      <div class="product-price">$19.99</div>
    </div>
    <div class="product">
      <img src="/path/to/image2.jpg" alt="Product 2">
      <div class="product-name">Product 2</div>
      <div class="product-price">$29.99</div>
    </div>
    <div class="product">
      <img src="/path/to/image3.jpg" alt="Product 3">
      <div class="product-name">Product 3</div>
      <div class="product-price">$39.99</div>
    </div>
    <div class="product">
      <img src="/path/to/image4.jpg" alt="Product 4">
      <div class="product-name">Product 4</div>
      <div class="product-price">$49.99</div>
    </div>
    <div class="product">
      <img src="/path/to/image5.jpg" alt="Product 5">
      <div class="product-name">Product 5</div>
      <div class="product-price">$59.99</div>
    </div>
    <div class="product">
      <img src="/path/to/image6.jpg" alt="Product 6">
      <div class="product-name">Product 6</div>
      <div class="product-price">$69.99</div>
    </div>
    <div class="product">
      <img src="/path/to/image7.jpg" alt="Product 7">
      <div class="product-name">Product 7</div>
      <div class="product-price">$79.99</div>
    </div>
    <div class="product">
      <img src="/path/to/image8.jpg" alt="Product 8">
      <div class="product-name">Product 8</div>
      <div class="product-price">$89.99</div>
    </div>
    <div class="product">
      <img src="/path/to/image9.jpg" alt="Product 9">
      <div class="product-name">Product 9</div>
      <div class="product-price">$99.99</div>
    </div>
    <div class="product">
      <img src="/path/to/image10.jpg" alt="Product 10">
      <div class="product-name">Product 10</div>
      <div class="product-price">$109.99</div>
    </div>
    <div class="product">
      <img src="/path/to/image11.jpg" alt="Product 11">
      <div class="product-name">Product 11</div>
      <div class="product-price">$119.99</div>
    </div>
    <div class="product">
      <img src="/path/to/image12.jpg" alt="Product 12">
      <div class="product-name">Product 12</div>
      <div class="product-price">$129.99</div>
    </div>
  </div>
  <div class="footer">Footer</div>
</body>
</html>
